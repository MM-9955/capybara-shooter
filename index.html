<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡皮巴拉飞行射击</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }
  #gameCanvas {
    border: 3px solid #4a4a6a;
    border-radius: 12px;
    display: block;
    box-shadow: 0 0 40px rgba(120,80,200,0.3);
  }
  #ui {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 30px;
    color: #e0d0ff;
    font-size: 18px;
    font-weight: bold;
    pointer-events: none;
  }
  #overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
  }
  #overlay h1 {
    font-size: 36px;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(180,130,255,0.8);
  }
  #overlay p {
    font-size: 16px;
    color: #c0b0e0;
    margin-bottom: 20px;
  }
  #overlay button {
    padding: 14px 40px;
    font-size: 20px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(135deg, #7b5ea7, #4a3080);
    color: white;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(120,80,200,0.5);
  }
  #overlay button:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 30px rgba(150,100,255,0.7);
  }
  .score-display {
    font-size: 22px;
    color: #f0d0ff;
  }
</style>
</head>
<body>

<div id="ui">
  <span>🏆 分数: <span id="scoreText">0</span></span>
  <span>❤️ 生命: <span id="livesText">3</span></span>
  <span>🌊 第 <span id="levelText">1</span> 关</span>
</div>

<div id="overlay">
  <h1>🦫 卡皮巴拉飞行射击</h1>
  <p>← → 移动 &nbsp;|&nbsp; 按住空格或点击 发射萝卜<br>消灭敌人，获得高分！</p>
  <button onclick="startGame()">开始游戏</button>
</div>

<canvas id="gameCanvas" width="480" height="700"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreText = document.getElementById('scoreText');
const livesText = document.getElementById('livesText');
const levelText = document.getElementById('levelText');

let W = canvas.width, H = canvas.height;

// Game state
let gameRunning = false;
let score = 0, lives = 3, level = 1;
let keys = {};
let bullets = [], enemies = [], particles = [], powerups = [], enemyBullets = [];
let frameCount = 0;
let spawnTimer = 0;
let powerupTimer = 0;

// Player
let player = {
  x: W/2, y: H - 80,
  w: 44, h: 44,
  speed: 5.5,
  shootCooldown: 0,
  invincible: 0,
  pwrup: 0,
  pwrupTimer: 0
};

// Capybara - 超萌版 🦫
function drawCapybara(x, y, w, h, flipped) {
  ctx.save();
  ctx.translate(x, y);
  if (flipped) ctx.scale(-1, 1);
  ctx.translate(-w/2, -h/2);

  // 身体阴影
  ctx.fillStyle = '#6B4910';
  ctx.beginPath();
  ctx.ellipse(w/2, h*0.65, w*0.4, h*0.35, 0, 0, Math.PI*2);
  ctx.fill();

  // 身体（更圆润）
  ctx.fillStyle = '#C4962A';
  ctx.beginPath();
  ctx.ellipse(w/2, h*0.62, w*0.38, h*0.33, 0, 0, Math.PI*2);
  ctx.fill();

  // 小手（萌萌的）
  ctx.fillStyle = '#B8862B';
  ctx.beginPath();
  ctx.ellipse(w*0.25, h*0.72, w*0.12, h*0.08, -0.3, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(w*0.75, h*0.72, w*0.12, h*0.08, 0.3, 0, Math.PI*2);
  ctx.fill();

  // 头部阴影
  ctx.fillStyle = '#8B6914';
  ctx.beginPath();
  ctx.ellipse(w/2, h*0.35, w*0.34, h*0.30, 0, 0, Math.PI*2);
  ctx.fill();

  // 头部（更圆更萌）
  ctx.fillStyle = '#D4A635';
  ctx.beginPath();
  ctx.ellipse(w/2, h*0.32, w*0.32, h*0.28, 0, 0, Math.PI*2);
  ctx.fill();

  // 耳朵（圆圆的）
  ctx.fillStyle = '#C4962A';
  ctx.beginPath();
  ctx.ellipse(w*0.28, h*0.08, 7, 6, -0.2, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(w*0.72, h*0.08, 7, 6, 0.2, 0, Math.PI*2);
  ctx.fill();
  // 耳朵内部（粉色）
  ctx.fillStyle = '#E8B4B4';
  ctx.beginPath();
  ctx.ellipse(w*0.28, h*0.08, 4, 3, -0.2, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(w*0.72, h*0.08, 4, 3, 0.2, 0, Math.PI*2);
  ctx.fill();

  // 脸颊腮红（超萌！）
  ctx.fillStyle = 'rgba(255, 150, 150, 0.5)';
  ctx.beginPath();
  ctx.ellipse(w*0.28, h*0.38, 8, 5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(w*0.72, h*0.38, 8, 5, 0, 0, Math.PI*2);
  ctx.fill();

  // 鼻子区域
  ctx.fillStyle = '#E5C060';
  ctx.beginPath();
  ctx.ellipse(w*0.58, h*0.42, w*0.16, h*0.12, 0, 0, Math.PI*2);
  ctx.fill();

  // 鼻孔（小小的）
  ctx.fillStyle = '#5a3a08';
  ctx.beginPath();
  ctx.ellipse(w*0.52, h*0.40, 2.5, 2, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(w*0.64, h*0.40, 2.5, 2, 0, 0, Math.PI*2);
  ctx.fill();

  // 眼睛（大大的，超萌！）
  // 眼白
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.ellipse(w*0.38, h*0.26, 7, 8, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(w*0.62, h*0.26, 7, 8, 0, 0, Math.PI*2);
  ctx.fill();
  // 眼珠（黑黑的）
  ctx.fillStyle = '#1a0a00';
  ctx.beginPath();
  ctx.ellipse(w*0.38, h*0.27, 4, 5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(w*0.62, h*0.27, 4, 5, 0, 0, Math.PI*2);
  ctx.fill();
  // 眼睛高光（亮晶晶）
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(w*0.36, h*0.24, 2, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(w*0.60, h*0.24, 2, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(w*0.40, h*0.29, 1, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(w*0.64, h*0.29, 1, 0, Math.PI*2);
  ctx.fill();

  // 嘴巴（微笑曲线）
  ctx.strokeStyle = '#5a3a08';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(w*0.58, h*0.48, 5, 0.2, Math.PI - 0.2);
  ctx.stroke();

  ctx.restore();
}

// Mini capybara (player) with glow
function drawPlayer(p) {
  if (p.invincible > 0 && Math.floor(p.invincible/5)%2) return;

  ctx.save();
  // Glow
  if (p.pwrupTimer > 0) {
    ctx.shadowColor = '#ffcc44';
    ctx.shadowBlur = 25;
  }
  drawCapybara(p.x, p.y, p.w * 1.1, p.h * 1.1, false);

  // 可爱的小耳机（发射器）
  ctx.fillStyle = '#FF69B4';
  ctx.beginPath();
  ctx.arc(p.x - 8, p.y - 12, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(p.x + 8, p.y - 12, 5, 0, Math.PI * 2);
  ctx.fill();
  // 耳机连接线
  ctx.strokeStyle = '#FF69B4';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(p.x - 8, p.y - 7);
  ctx.lineTo(p.x - 8, p.y - 12);
  ctx.moveTo(p.x + 8, p.y - 7);
  ctx.lineTo(p.x + 8, p.y - 12);
  ctx.stroke();

  ctx.restore();
}

// Enemy: angry bird
function drawEnemy(x, y, type) {
  ctx.save();
  ctx.translate(x, y);
  const s = type === 'big' ? 1.4 : 1;

  // Body
  ctx.fillStyle = type === 'big' ? '#cc2200' : type === 'mid' ? '#ee5500' : '#ff8800';
  ctx.beginPath();
  ctx.ellipse(0, 0, 18*s, 14*s, 0, 0, Math.PI*2);
  ctx.fill();

  // Wing
  ctx.fillStyle = type === 'big' ? '#aa1800' : type === 'mid' ? '#cc4400' : '#dd6600';
  ctx.beginPath();
  ctx.ellipse(-10*s, 5*s, 10*s, 6*s, -0.5, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(10*s, 5*s, 10*s, 6*s, 0.5, 0, Math.PI*2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(-5*s, -3*s, 5*s, 0, Math.PI*2);
  ctx.arc(5*s, -3*s, 5*s, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(-4*s, -3*s, 2.5*s, 0, Math.PI*2);
  ctx.arc(6*s, -3*s, 2.5*s, 0, Math.PI*2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#ffaa00';
  ctx.beginPath();
  ctx.moveTo(0, 2*s);
  ctx.lineTo(-5*s, 8*s);
  ctx.lineTo(5*s, 8*s);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

// Bullet
function drawBullet(x, y, isEnemy) {
  ctx.save();
  if (!isEnemy) {
    // Carrot bullet
    ctx.fillStyle = '#ff8c00';
    ctx.beginPath();
    ctx.ellipse(x, y, 4, 8, 0, 0, Math.PI*2);
    ctx.fill();
    // Carrot top
    ctx.fillStyle = '#22aa22';
    ctx.beginPath();
    ctx.moveTo(x, y-8);
    ctx.lineTo(x-3, y-13);
    ctx.lineTo(x, y-10);
    ctx.lineTo(x+3, y-13);
    ctx.closePath();
    ctx.fill();
  } else {
    // Enemy bullet: water drop
    ctx.fillStyle = '#4488ff';
    ctx.shadowColor = '#4488ff';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.ellipse(x, y, 4, 6, 0, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

// Powerup
function drawPowerup(x, y) {
  ctx.save();
  ctx.shadowColor = '#ff44ff';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#ff44ff';
  ctx.beginPath();
  ctx.arc(x, y, 12, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowBlur = 0;
  ctx.fillText('P', x, y);
  ctx.restore();
}

// Particle
function addParticle(x, y, color, count) {
  for (let i=0; i<count; i++) {
    let angle = Math.random()*Math.PI*2;
    let speed = Math.random()*3+1;
    particles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      life: 30+Math.random()*20,
      color,
      size: Math.random()*4+2
    });
  }
}

// Stars background
let stars = [];
for (let i=0; i<80; i++) {
  stars.push({
    x: Math.random()*W, y: Math.random()*H,
    size: Math.random()*1.5+0.5,
    speed: Math.random()*0.5+0.3,
    twinkle: Math.random()*Math.PI*2
  });
}

function drawBackground() {
  // Night sky gradient
  let grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, '#0d0d2b');
  grad.addColorStop(1, '#1a1a4e');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > H) { s.y=0; s.x=Math.random()*W; }
    s.twinkle += 0.03;
    let alpha = 0.4 + Math.sin(s.twinkle)*0.3;
    ctx.fillStyle = `rgba(200,200,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
    ctx.fill();
  });

  // Water / pond at bottom
  let waterGrad = ctx.createLinearGradient(0, H-80, 0, H);
  waterGrad.addColorStop(0, 'rgba(30,80,120,0)');
  waterGrad.addColorStop(1, 'rgba(30,100,160,0.5)');
  ctx.fillStyle = waterGrad;
  ctx.fillRect(0, H-80, W, 80);

  // Water ripples
  ctx.strokeStyle = 'rgba(100,180,255,0.2)';
  ctx.lineWidth = 1;
  for (let i=0; i<3; i++) {
    let ry = H-20+i*20;
    let offset = (frameCount*0.5+i*30)%60;
    ctx.beginPath();
    ctx.moveTo(0, ry);
    for (let x=0; x<=W; x+=10) {
      ctx.lineTo(x, ry + Math.sin((x+offset)*0.05)*3);
    }
    ctx.stroke();
  }
}

// Spawn enemies
function spawnEnemy() {
  let types = ['small','small','small','mid','mid','big'];
  let type = types[Math.floor(Math.random()*types.length)];
  let pts = { x: Math.random()*(W-60)+30, y: -40 };
  let spd = type==='big' ? 1.2 : type==='mid' ? 1.8 : 2.5 + Math.random();
  let hp = type==='big' ? 3 : type==='mid' ? 2 : 1;
  let pts_val = type==='big' ? 30 : type==='mid' ? 15 : 5;
  enemies.push({ ...pts, type, spd, hp, maxHp: hp, pts: pts_val, shootCd: 60+Math.random()*120, angle: 0 });
}

function spawnPowerup(x, y) {
  if (Math.random() < 0.12) {
    powerups.push({ x, y, vy: 1.5 });
  }
}

// Shoot
function shoot() {
  if (player.shootCooldown > 0) return;
  player.shootCooldown = player.pwrup > 0 ? 6 : 14;
  if (player.pwrup > 0) {
    bullets.push({ x: player.x-12, y: player.y-player.h/2-5, vy: -10 });
    bullets.push({ x: player.x+12, y: player.y-player.h/2-5, vy: -10 });
  } else {
    bullets.push({ x: player.x, y: player.y-player.h/2-5, vy: -10 });
  }
}

// Update
function update() {
  if (!gameRunning) return;
  frameCount++;

  // Player movement: mouse follows smoothly, keyboard also works
  let targetX = player.x;
  if (keys['ArrowLeft'] || keys['a']) targetX = player.x - player.speed;
  if (keys['ArrowRight'] || keys['d']) targetX = player.x + player.speed;
  if (keys['ArrowUp'] || keys['w']) player.y -= player.speed;
  if (keys['ArrowDown'] || keys['s']) player.y += player.speed;
  // Mouse X tracking (smooth lerp)
  let dx = mouseX - player.x;
  player.x += dx * 0.18;
  player.x = Math.max(player.w/2, Math.min(W-player.w/2, player.x));
  player.y = Math.max(player.h/2, Math.min(H-player.h/2, player.y));
  if (player.shootCooldown > 0) player.shootCooldown--;
  if (player.invincible > 0) player.invincible--;
  if (player.pwrupTimer > 0) { player.pwrupTimer--; if(player.pwrupTimer<=0) player.pwrup=0; }

  // Auto shoot when holding space
  if (keys[' ']) shoot();

  // Move bullets
  bullets = bullets.filter(b => { b.y += b.vy; return b.y > -10; });
  enemyBullets = enemyBullets.filter(b => { b.y += 5; return b.y < H+10; });

  // Move enemies
  enemies.forEach(e => {
    e.y += e.spd;
    e.angle += 0.05;
    if (e.shootCd !== undefined) {
      e.shootCd--;
      if (e.shootCd <= 0 && e.y > 0 && e.y < H/2) {
        enemyBullets.push({ x: e.x, y: e.y + 15, vx: (player.x-e.x)*0.02 });
        e.shootCd = 80+Math.random()*100;
      }
    }
  });
  enemies = enemies.filter(e => e.y < H+40);

  // Collision: bullet vs enemy
  bullets.forEach((b, bi) => {
    enemies.forEach((e, ei) => {
      let hitR = (e.type==='big'?22:e.type==='mid'?18:14);
      if (Math.hypot(b.x-e.x, b.y-e.y) < hitR) {
        e.hp--;
        bullets.splice(bi, 1);
        addParticle(b.x, b.y, '#ffaa00', 5);
        if (e.hp <= 0) {
          addParticle(e.x, e.y, e.type==='big'?'#ff2200':'#ff8800', 12);
          score += e.pts;
          spawnPowerup(e.x, e.y);
          enemies.splice(ei, 1);
          if (score > 0 && score % 200 === 0) levelUp();
        }
      }
    });
  });

  // Collision: enemy vs player
  enemies.forEach((e, ei) => {
    let hitR = (e.type==='big'?22:e.type==='mid'?18:14);
    if (Math.hypot(player.x-e.x, player.y-e.y) < hitR+18) {
      if (player.invincible<=0) {
        lives--;
        player.invincible = 90;
        addParticle(player.x, player.y, '#ff4444', 15);
        enemies.splice(ei, 1);
        if (lives <= 0) gameOver();
      }
    }
  });

  // Collision: enemy bullet vs player
  enemyBullets.forEach((b, bi) => {
    if (Math.hypot(b.x-player.x, b.y-player.y) < 18) {
      if (player.invincible<=0) {
        lives--;
        player.invincible = 90;
        addParticle(b.x, b.y, '#4488ff', 8);
        enemyBullets.splice(bi, 1);
        if (lives <= 0) gameOver();
      }
    }
  });

  // Powerups
  powerups = powerups.filter(p => {
    p.y += p.vy;
    if (Math.hypot(player.x-p.x, player.y-p.y) < 28) {
      player.pwrup = 1;
      player.pwrupTimer = 600; // 10 sec
      addParticle(p.x, p.y, '#ff44ff', 10);
      return false;
    }
    return p.y < H+20;
  });

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05;
    p.life--;
    return p.life > 0;
  });

  // Spawn
  spawnTimer++;
  let interval = Math.max(25, 60 - level*4);
  if (spawnTimer >= interval) {
    spawnTimer = 0;
    spawnEnemy();
  }

  updateUI();
}

function levelUp() {
  level++;
  player.pwrup = 1;
  player.pwrupTimer = 300;
}

function updateUI() {
  scoreText.textContent = score;
  livesText.textContent = lives;
  levelText.textContent = level;
}

function draw() {
  drawBackground();

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life/50;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Powerups
  powerups.forEach(p => drawPowerup(p.x, p.y));

  // Enemies
  enemies.forEach(e => drawEnemy(e.x, e.y, e.type));

  // Bullets
  bullets.forEach(b => drawBullet(b.x, b.y, false));
  enemyBullets.forEach(b => drawBullet(b.x, b.y, true));

  // Player
  drawPlayer(player);

  // Powerup timer bar
  if (player.pwrupTimer > 0) {
    let barW = (player.pwrupTimer/600)*80;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(player.x-40, player.y+30, 80, 6);
    ctx.fillStyle = '#ffcc44';
    ctx.fillRect(player.x-40, player.y+30, barW, 6);
  }

  // Invincible flash
  if (player.invincible > 0) {
    ctx.fillStyle = `rgba(255,100,100,${Math.sin(frameCount*0.3)*0.15+0.1})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Start / Restart
function startGame() {
  score = 0; lives = 3; level = 1;
  bullets = []; enemies = []; particles = []; powerups = []; enemyBullets = [];
  player.x = W/2; player.y = H-80;
  player.invincible = 60;
  player.pwrup = 0; player.pwrupTimer = 0;
  spawnTimer = 0; frameCount = 0;
  gameRunning = true;
  overlay.style.display = 'none';
  updateUI();
}

function gameOver() {
  gameRunning = false;
  overlay.innerHTML = `
    <h1>游戏结束 🎉</h1>
    <p class="score-display">最终分数: ${score} &nbsp; 关卡: ${level}</p>
    <p>${score < 50 ? '卡皮巴拉有点累了，再来一次！' : score < 200 ? '还不错！继续加油！' : score < 500 ? '太厉害了！你是飞行高手！' : '封神！卡皮巴拉之王！'}</p>
    <button onclick="startGame()">再来一局</button>
  `;
  overlay.style.display = 'flex';
}

// Controls
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') { e.preventDefault(); shoot(); }
});
document.addEventListener('keyup', e => keys[e.key] = false);

canvas.addEventListener('mousedown', () => { keys[' '] = true; shoot(); });
canvas.addEventListener('mouseup', () => keys[' '] = false);
canvas.addEventListener('touchstart', e => { e.preventDefault(); keys[' '] = true; shoot(); });
canvas.addEventListener('touchend', e => { e.preventDefault(); keys[' '] = false; });

// Mouse control: player follows mouse X
let mouseX = W / 2;
canvas.addEventListener('mousemove', e => {
  let rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
});
canvas.addEventListener('click', e => {
  let rect = canvas.getBoundingClientRect();
  let cx = e.clientX - rect.left;
  player.x = Math.max(player.w/2, Math.min(W-player.w/2, cx));
});

// Touch / drag
let touching = false;
let touchingX = W/2;
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (touching) {
    let tx = e.touches[0].clientX - canvas.getBoundingClientRect().left;
    player.x = Math.max(player.w/2, Math.min(W-player.w/2, tx));
  }
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touching = true;
  let tx = e.touches[0].clientX - canvas.getBoundingClientRect().left;
  player.x = Math.max(player.w/2, Math.min(W-player.w/2, tx));
});
canvas.addEventListener('touchend', e => { e.preventDefault(); touching = false; });

// Initial draw
draw();
gameLoop();
</script>
</body>
</html>
